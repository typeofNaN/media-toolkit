appId: com.electron.ffmpeg-tool
productName: Media Toolkit
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - from: node_modules/@ffmpeg-installer/**
    to: ffmpeg
    filter:
      - '**/*'
  - from: node_modules/@ffprobe-installer/**
    to: ffprobe
    filter:
      - '**/*'
mac:
  category: public.app-category.video
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: build/icon.icns
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
        - arm64
  category: AudioVideo
  icon: build/icon.png
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
